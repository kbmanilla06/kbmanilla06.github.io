<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title description">
  <title id="title">AegisAI synthetic network defense dashboard</title>
  <desc id="description">A WashDish Design Language interface showing system readiness, synthetic-only evidence, defensive ingestion formats, and simulation-only prevention.</desc>
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#05070a"/><stop offset="1" stop-color="#090c11"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000" flood-opacity=".36"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#2e3743" stroke-opacity=".23"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#canvas)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>

  <g filter="url(#shadow)">
    <rect x="64" y="56" width="1472" height="888" rx="24" fill="#090c11" stroke="#586373" stroke-width="2"/>
    <path d="M64 152H1536" stroke="#586373" stroke-width="2"/>
  </g>

  <g font-family="Inter,Arial,sans-serif">
    <g transform="translate(104 91)">
      <path d="M23 0l20 7v17c0 17-9 29-20 36C12 53 3 41 3 24V7z" fill="#141a22" stroke="#6ea8fe" stroke-width="3"/>
      <path d="M14 27l6 6 13-15" fill="none" stroke="#6ea8fe" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="62" y="25" fill="#f7f8fa" font-size="25" font-weight="700">AegisAI NIDPS</text>
      <text x="62" y="48" fill="#969fac" font-size="14" font-weight="500">Defensive evidence console</text>
    </g>
    <g transform="translate(1248 88)">
      <rect width="244" height="44" rx="22" fill="#0d2d1b" stroke="#2f8f57" stroke-width="2"/>
      <circle cx="25" cy="22" r="6" fill="#49c47a"/>
      <text x="43" y="28" fill="#f7f8fa" font-size="14" font-weight="600">Portfolio milestone complete</text>
    </g>

    <text x="104" y="218" fill="#969fac" font-size="14" font-weight="600" letter-spacing="2">SYSTEM OVERVIEW</text>
    <text x="104" y="268" fill="#f7f8fa" font-size="38" font-weight="700">Evidence before claims.</text>
    <text x="104" y="304" fill="#b8bec8" font-size="18">Synthetic-only IDS with prevention constrained to simulation.</text>

    <g transform="translate(104 352)">
      <rect width="440" height="244" rx="16" fill="#141a22" stroke="#7a8594" stroke-width="2"/>
      <text x="24" y="40" fill="#969fac" font-size="13" font-weight="600" letter-spacing="1.6">PLATFORM POSTURE</text>
      <text x="24" y="92" fill="#f7f8fa" font-size="25" font-weight="700">Ready for local review</text>
      <g transform="translate(24 124)">
        <rect width="392" height="52" rx="12" fill="#1b232d" stroke="#586373"/>
        <circle cx="26" cy="26" r="7" fill="#49c47a"/>
        <text x="46" y="23" fill="#f7f8fa" font-size="14" font-weight="600">Hosted CI passed</text>
        <text x="46" y="41" fill="#969fac" font-size="12">Quality, security, frontend, and Compose gates</text>
      </g>
      <text x="24" y="216" fill="#b8bec8" font-size="14">264 backend · 7 frontend tests passed</text>
    </g>

    <g transform="translate(568 352)">
      <rect width="448" height="244" rx="16" fill="#141a22" stroke="#7a8594" stroke-width="2"/>
      <text x="24" y="40" fill="#969fac" font-size="13" font-weight="600" letter-spacing="1.6">OFFLINE INPUT BOUNDARIES</text>
      <g transform="translate(24 72)" font-size="14" font-weight="600">
        <rect width="190" height="56" rx="12" fill="#1b232d" stroke="#586373"/><text x="18" y="34" fill="#f7f8fa">Canonical JSONL</text>
        <rect x="210" width="190" height="56" rx="12" fill="#1b232d" stroke="#586373"/><text x="228" y="34" fill="#f7f8fa">Zeek connection</text>
        <rect y="76" width="190" height="56" rx="12" fill="#1b232d" stroke="#586373"/><text x="18" y="110" fill="#f7f8fa">Suricata EVE</text>
        <rect x="210" y="76" width="190" height="56" rx="12" fill="#1b232d" stroke="#586373"/><text x="228" y="110" fill="#f7f8fa">PCAP / PCAPNG</text>
      </g>
    </g>

    <g transform="translate(1040 352)">
      <rect width="452" height="244" rx="16" fill="#141a22" stroke="#7a8594" stroke-width="2"/>
      <text x="24" y="40" fill="#969fac" font-size="13" font-weight="600" letter-spacing="1.6">SAFETY BOUNDARY</text>
      <rect x="24" y="72" width="404" height="68" rx="12" fill="#332507" stroke="#a97819" stroke-width="2"/>
      <text x="46" y="100" fill="#f2b84b" font-size="14" font-weight="700">SIMULATION ONLY</text>
      <text x="46" y="123" fill="#f7f8fa" font-size="13">No firewall, packet, host, or network changes</text>
      <g fill="#b8bec8" font-size="13">
        <text x="24" y="178">No live capture · No online inference</text>
        <text x="24" y="204">No automatic blocking · No real dataset</text>
      </g>
    </g>

    <g transform="translate(104 632)">
      <rect width="1388" height="248" rx="16" fill="#0e1218" stroke="#586373" stroke-width="2"/>
      <text x="24" y="40" fill="#969fac" font-size="13" font-weight="600" letter-spacing="1.6">DEFENSIVE PIPELINE</text>
      <g transform="translate(24 72)">
        <g>
          <rect width="280" height="132" rx="12" fill="#141a22" stroke="#7a8594"/>
          <text x="18" y="30" fill="#6ea8fe" font-size="12" font-weight="600">01 · INPUT</text>
          <text x="18" y="62" fill="#f7f8fa" font-size="17" font-weight="600">Authorized telemetry</text>
          <text x="18" y="91" fill="#969fac" font-size="13">Strict schema · hostile-input controls</text>
        </g>
        <path d="M296 66h38" stroke="#969fac" stroke-width="2"/><path d="m328 59 8 7-8 7" fill="none" stroke="#969fac" stroke-width="2"/>
        <g transform="translate(352)">
          <rect width="280" height="132" rx="12" fill="#141a22" stroke="#7a8594"/>
          <text x="18" y="30" fill="#6ea8fe" font-size="12" font-weight="600">02 · TRUST</text>
          <text x="18" y="62" fill="#f7f8fa" font-size="17" font-weight="600">FastAPI + RBAC</text>
          <text x="18" y="91" fill="#969fac" font-size="13">Authorize · validate · audit</text>
        </g>
        <path d="M648 66h38" stroke="#969fac" stroke-width="2"/><path d="m680 59 8 7-8 7" fill="none" stroke="#969fac" stroke-width="2"/>
        <g transform="translate(704)">
          <rect width="280" height="132" rx="12" fill="#141a22" stroke="#7a8594"/>
          <text x="18" y="30" fill="#6ea8fe" font-size="12" font-weight="600">03 · EVIDENCE</text>
          <text x="18" y="62" fill="#f7f8fa" font-size="17" font-weight="600">Detect + preserve</text>
          <text x="18" y="91" fill="#969fac" font-size="13">Fingerprint · provenance · retention</text>
        </g>
        <path d="M1000 66h38" stroke="#969fac" stroke-width="2"/><path d="m1032 59 8 7-8 7" fill="none" stroke="#969fac" stroke-width="2"/>
        <g transform="translate(1056)">
          <rect width="284" height="132" rx="12" fill="#141a22" stroke="#7a8594"/>
          <text x="18" y="30" fill="#6ea8fe" font-size="12" font-weight="600">04 · REVIEW</text>
          <text x="18" y="62" fill="#f7f8fa" font-size="17" font-weight="600">Analyst decision</text>
          <text x="18" y="91" fill="#969fac" font-size="13">Explainable · audited · reversible</text>
        </g>
      </g>
    </g>
  </g>
</svg>
